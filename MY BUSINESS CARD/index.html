<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexa Business Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card-container">

    <!-- FRONT SIDE -->
    <div class="card front">
      <div class="logo">NEXA</div>

      <h1>Nexa Developments</h1>
      <p class="tag">Real Estate & Property Solutions</p>

      <div class="info">
        <p><strong>Richard Ahadzi</strong></p>
        <p>Founder & Developer</p>
        <br>
        <p>📞 +233 XX XXX XXXX</p>
        <p>📧 info@nexadevelopments.com</p>
        <p>🌐 www.nexadevelopments.com</p>
        <p>📍 Accra, Ghana</p>
      </div>
    </div>

    <!-- BACK SIDE -->
    <div class="card back">
      <div class="overlay">
        <div class="logo">NEXA</div>
        <p class="tagline">Building the Future. Creating Value.</p>

        <!-- QR Placeholder -->
        <div class="qr">
          <img src="adobe-express-qr-code(1)(1).png" alt="QR Code">
        </div>

      </div>
    </div>

  </div>

</body>
</html>
